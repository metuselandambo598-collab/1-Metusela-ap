name: Build 1 Metusela APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: |
          sudo apt-get update
          sudo apt-get install -y scons build-essential libgalago-dev libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good gstreamer1.0-plugins-bad gstreamer1.0-plugins-ugly gstreamer1.0-libav libmtp-dev libjpeg-dev zlib1g-dev python3-dev python3-pip libsqlite3-dev sqlite3
          pip install buildozer cython==0.29.33

      - run: |
          buildozer init
          sed -i 's/^title = .*/title = 1 Metusela/' buildozer.spec
          sed -i 's/^package.name = .*/package.name = onesela/' buildozer.spec
          sed -i 's/^requirements = .*/requirements = python3, kivy, pillow, setuptools/' buildozer.spec
          sed -i 's/^# android.permissions = .*/android.permissions = READ_EXTERNAL_STORAGE, WRITE_EXTERNAL_STORAGE, READ_MEDIA_IMAGES, READ_MEDIA_VIDEO/' buildozer.spec
          sed -i 's/^android.api = .*/android.api = 34/' buildozer.spec
          sed -i 's/^android.minapi = .*/android.minapi = 21/' buildozer.spec
          sed -i 's/^# android.request_legacy_external_storage = .*/android.request_legacy_external_storage = True/' buildozer.spec

      - run: yes | buildozer -v android debug

      - uses: actions/upload-artifact@v4
        with:
          name: 1-Metusela-APK
          path: bin/*.apk
